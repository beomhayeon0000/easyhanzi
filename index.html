<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyHanzi — Học từ vựng tiếng Trung</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      PHẦN C1 — Widget chat hỗ trợ trực tiếp (Tawk.to)
      Làm theo hướng dẫn trong README.md để lấy đoạn script thật của bạn,
      rồi thay thế nguyên khối bên dưới bằng đoạn Tawk.to cung cấp.
    -->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {};
      var Tawk_LoadStart = new Date();
      (function () {
        var s1 = document.createElement("script"),
          s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        // Thay YOUR_WIDGET_ID bằng ID thật lấy từ tawk.to (xem README.md)
        s1.src = "https://embed.tawk.to/YOUR_WIDGET_ID/default";
        s1.charset = "UTF-8";
        s1.setAttribute("crossorigin", "*");
        s0.parentNode.insertBefore(s1, s0);
      })();
    </script>
  </body>
</html>
